# Don't treat code/backticks & non-http tokens as links
exclude = [
  "CT:*",               # Civic Tome pseudo refs
  "mailto:*",
  "arxiv.org",          # Rate-limits CI link checkers
  "psypost.org",        # Aggregator, flaky
  "techxplore.com",     # Aggregator, flaky
  "digi-con.org"        # Academic site, intermittent
]
# Retry a couple times for GitHub flakiness
max_retries = 2
timeout = 20
# Accept 200..399
accept = [200, 204, 206, 301, 302, 307, 308]
# Consider GitHub relative links OK (they exist in repo)
require_https = false
